<!doctypehtml>  <head> <meta content="text/html;charset=utf-8"http-equiv=Content-Type> <meta content="TiddlyWiki Plugin Library"name=application-name> <meta content=v0.0.0 name=application-version> <meta content="Copyright 2015 Jeremy Ruston"name=copyright> <link href=favicon.ico id=faviconLink rel="shortcut icon"> <title>Plugin Library</title> <script>var assetList=[{version:"0.0.9",type:"application/json",title:"$:/plugins/Gk0Wk/echarts","plugin-type":"plugin",name:"ECharts",list:"readme LICENSE",description:"ECharts for TiddlyWiki5",author:"Gk0Wk",source:"https://github.com/tiddly-gittly/tw-echarts/tree/master/plugins/Gk0Wk/echarts",dependents:"",readme:'<$list filter="[[$:/language]get[text]removeprefix[$:/languages/]else[en-GB]]" variable="lang">\n<$list filter="[<lang>search[zh]]">\n\n将强大的可视化工具 [[ECharts|https://echarts.apache.org/zh/index.html]] 以优雅的方式与 TiddlyWiki 相结合。\n\n插件说明与使用教程较长，请参考 https://tiddly-gittly.github.io/tw-echarts/\n\n</$list>\n\n<$list filter="[<lang>!search[zh]]">\n\nCombines the powerful visualization tool [[ECharts|https://echarts.apache.org/en/index.html]] with TiddlyWiki in an elegant way.\n\nThe plugin description and tutorial is long, please refer to https://tiddly-gittly.github.io/tw-echarts/\n\n</$list>\n</$list>\n\n[img[https://tc9011.com/assets/images/Echarts%E6%94%B9%E9%80%A0%E4%B9%8B%E5%8A%A8%E6%80%81%E6%98%BE%E7%A4%BA/banner.png]]\n',"requires-reload":"yes"},{version:"2.0.8",type:"application/json",title:"$:/plugins/Gk0Wk/echarts-gl","plugin-type":"plugin",name:"ECharts GL",list:"readme",description:"ECharts-GL provides 3D plots, globe visualization and WebGL acceleration",source:"https://github.com/tiddly-gittly/tw-echarts/tree/master/plugins/Gk0Wk/echarts-gl","parent-plugin":"$:/plugins/Gk0Wk/echarts",dependents:"$:/plugins/Gk0Wk/echarts",readme:'<$list filter="[[$:/language]get[text]removeprefix[$:/languages/]else[en-GB]]" variable="lang">\n<$list filter="[<lang>search[zh]]">\n\n[[ECharts-GL|https://github.com/ecomfe/echarts-gl]] 是Apache ECharts的一个扩展包，它提供3D绘图、地球仪可视化和WebGL加速。\n\n* 文档: https://echarts.apache.org/zh/option-gl.html\n* 示例: https://www.makeapie.com/explore.html#tags=echarts-gl\n\n</$list>\n\n<$list filter="[<lang>!search[zh]]">\n\n[[ECharts-GL|https://github.com/ecomfe/echarts-gl]] is an extension pack of Apache ECharts, which providing 3D plots, globe visualization and WebGL acceleration.\n\n* Doc: https://echarts.apache.org/en/option-gl.html\n* Examples: https://www.makeapie.com/explore.html#tags=echarts-gl\n\n</$list>\n</$list>\n\n[img[https://deyihu.github.io/images/maptalks-echarts-gl.png]]\n',"requires-reload":"yes"},{version:"2.1.0",type:"application/json",title:"$:/plugins/Gk0Wk/echarts-graph-modularity","plugin-type":"plugin",name:"ECharts Graph Modularity",list:"readme",description:"Graph modularity extension for Apache ECharts",source:"https://github.com/tiddly-gittly/tw-echarts/tree/master/plugins/Gk0Wk/echarts-graph-modularity","parent-plugin":"$:/plugins/Gk0Wk/echarts",dependents:"$:/plugins/Gk0Wk/echarts",readme:'<$list filter="[[$:/language]get[text]removeprefix[$:/languages/]else[en-GB]]" variable="lang">\n<$list filter="[<lang>search[zh]]">\n\n[[Graph modularity extension|https://github.com/ecomfe/echarts-graph-modularity]] 将进行社区检测，并将图的顶点划分为几个子集。每个子集都将被分配一个不同的颜色。\n\n* 文档: https://github.com/ecomfe/echarts-graph-modularity\n\n</$list>\n\n<$list filter="[<lang>!search[zh]]">\n\n[[Graph modularity extension|https://github.com/ecomfe/echarts-graph-modularity]] will do community detection and partition a graph\'s vertices in several subsets. Each subset will be assigned a different color.\n\n* Doc: https://github.com/ecomfe/echarts-graph-modularity\n\n</$list>\n</$list>\n\n[img[https://github.com/ecomfe/echarts-graph-modularity/raw/master/example/modularity.png]]\n',"requires-reload":"yes"},{version:"3.1.0",type:"application/json",title:"$:/plugins/Gk0Wk/echarts-liquidfill","plugin-type":"plugin",name:"ECharts Liquid Fill Chart",list:"readme",description:"Liquid Fill Chart plugin for Apache ECharts, which is usually used to represent data in percentage.",source:"https://github.com/tiddly-gittly/tw-echarts/tree/master/plugins/Gk0Wk/echarts-liquidfill","parent-plugin":"$:/plugins/Gk0Wk/echarts",dependents:"$:/plugins/Gk0Wk/echarts",readme:'<$list filter="[[$:/language]get[text]removeprefix[$:/languages/]else[en-GB]]" variable="lang">\n<$list filter="[<lang>search[zh]]">\n\n[[liquid-fill chart|https://github.com/ecomfe/echarts-liquidfill]] 是一个适合展示单一百分比数据的图表，支持多种水波和动画。\n\n* 文档: https://github.com/ecomfe/echarts-liquidfill\n* 示例: https://www.makeapie.com/explore.html#tags=liquidFill~sort=rank~timeframe=all~author=all\n\n</$list>\n\n<$list filter="[<lang>!search[zh]]">\n\nThe [[liquid-fill chart|https://github.com/ecomfe/echarts-liquidfill]] is a chart suitable for presenting a single percentage of data, supporting multiple water waves and animations.\n\n* Doc: https://github.com/ecomfe/echarts-liquidfill\n* Examples: https://www.makeapie.com/explore.html#tags=liquidFill~sort=rank~timeframe=all~author=all\n\n</$list>\n</$list>\n\n[img[https://camo.githubusercontent.com/5dee5f268a24b4a088abc369149ecaee64db44bc9192e7a54fc186b7e12a5e68/687474703a2f2f672e7265636f726469742e636f2f7a48654d71716c68346a2e676966]]\n',"requires-reload":"yes"},{version:"1.2.0",type:"application/json",title:"$:/plugins/Gk0Wk/echarts-stat","plugin-type":"plugin",name:"ECharts Stat",list:"readme",description:"The statistical extension is a tool for data analysis.",source:"https://github.com/tiddly-gittly/tw-echarts/tree/master/plugins/Gk0Wk/echarts-stat","parent-plugin":"$:/plugins/Gk0Wk/echarts",dependents:"$:/plugins/Gk0Wk/echarts",readme:'<$list filter="[[$:/language]get[text]removeprefix[$:/languages/]else[en-GB]]" variable="lang">\n<$list filter="[<lang>search[zh]]">\n\n[[Echarts Stat|https://github.com/ecomfe/echarts-stat]] 是Apache ECharts 的一个统计和数据挖掘工具。你可以用它来分析数据，然后用ECharts将结果可视化，或者只是用它来处理数据。\n\nEchartStat中，基本统计方法 `statistics` 的API导出至 `window.EChartsStat` 。\n\n* 文档: https://github.com/ecomfe/echarts-stat/blob/master/README.zh-CN.md\n\n</$list>\n\n<$list filter="[<lang>!search[zh]]">\n\n[[Echarts Stat|https://github.com/ecomfe/echarts-stat]] is a statistical and data mining tool for Apache ECharts. You can use it to analyze data and then visualize the results with ECharts, or just use it to process data.\n\nIn EchartStat, the API for the basic statistics method `statistics` is exported to `window.EChartsStat`.\n\n* Doc: https://github.com/ecomfe/echarts-stat/blob/master/README.md\n\n</$list>\n</$list>\n\n[img[https://github.com/ecomfe/echarts-stat/raw/master/img/histogram.png]]\n',"requires-reload":"yes"}];!function(){"use strict";window.addEventListener("message",(function(t){if(console.log("plugin library: Received message from",t.origin),console.log("plugin library: Message content",t.data),"GET"===t.data.verb)if("recipes/library/tiddlers.json"===t.data.url)t.source.postMessage({verb:"GET-RESPONSE",status:"200",cookies:t.data.cookies,url:t.data.url,type:"application/json",body:JSON.stringify(assetList,null,4)},"*");else if(0===t.data.url.indexOf("recipes/library/tiddlers/")){!function(t,e){var a=new XMLHttpRequest;a.open("GET",t,!0),a.onreadystatechange=function(){4==a.readyState&&200==a.status&&e(null,a.responseText)},a.send()}("recipes/library/tiddlers/"+encodeURIComponent((e=t.data.url,a="recipes/library/tiddlers/",0===e.indexOf(a)?e.substr(a.length):e)),(function(e,a){e?t.source.postMessage({verb:"GET-RESPONSE",status:"404",cookies:t.data.cookies,url:t.data.url,type:"text/plain",body:"Not found"},"*"):t.source.postMessage({verb:"GET-RESPONSE",status:"200",cookies:t.data.cookies,url:t.data.url,type:"application/json",body:a},"*")}))}else t.source.postMessage({verb:"GET-RESPONSE",status:"404",cookies:t.data.cookies,url:t.data.url,type:"text/plain",body:"Not found"},"*");var e,a}),!1)}()</script> </head> <h1>HelloThere</h1><p>This is the TiddlyWiki plugin library. It is not intended to be opened directly in the b
